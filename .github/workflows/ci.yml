name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  static-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check JavaScript syntax
        run: |
          node --check app.js
          node --check sw.js

      - name: Check required static assets
        run: |
          test -f index.html
          test -f app.js
          test -f styles.css
          test -f sw.js
          test -f assets/logo.png
